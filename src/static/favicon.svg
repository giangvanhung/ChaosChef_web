<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Nền bo góc, cùng tông với trang -->
  <rect width="64" height="64" rx="14" fill="#12131f"/>

  <!-- Cán chảo, chĩa xuống góc phải -->
  <rect x="44" y="41" width="20" height="7" rx="3.5"
        fill="#8a5a34" transform="rotate(40 44 44.5)"/>

  <!-- Lòng chảo -->
  <circle cx="30" cy="30" r="21" fill="#2a2c48"/>
  <circle cx="30" cy="30" r="21" fill="none" stroke="#ff8a3d" stroke-width="4"/>

  <!-- Lòng trắng trứng: hai ellipse chồng nhau cho méo tự nhiên -->
  <ellipse cx="30" cy="30" rx="14" ry="16" fill="#f5f0e8"/>
  <circle cx="34" cy="34" r="10" fill="#f5f0e8"/>

  <!-- Lòng đỏ -->
  <circle cx="29" cy="30" r="7.5" fill="#ffb347"/>
  <circle cx="26.5" cy="27.5" r="2.4" fill="#ffd58a"/>
</svg>
